<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Burmese Companion (Mock)</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        --bg: #0b1020;
        --card: #111a33;
        --text: #e9eefc;
        --muted: #a8b4d8;
        --accent: #7aa2ff;
        --danger: #ff6b6b;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans Myanmar",
          "Myanmar Text", sans-serif;
        background: radial-gradient(1200px 800px at 20% 20%, #141b38, var(--bg));
        color: var(--text);
      }
      .wrap {
        max-width: 980px;
        margin: 0 auto;
        padding: 18px;
      }
      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      .card {
        background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
        border: 1px solid rgba(255,255,255,0.10);
        border-radius: 14px;
        padding: 14px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.30);
      }
      h1 {
        font-size: 18px;
        margin: 0 0 10px;
        color: var(--text);
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.14);
        background: rgba(0,0,0,0.20);
        color: var(--text);
        cursor: pointer;
        user-select: none;
      }
      .pill[aria-pressed="true"] {
        border-color: rgba(122,162,255,0.8);
        box-shadow: 0 0 0 3px rgba(122,162,255,0.20);
      }
      .btn {
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.14);
        background: rgba(0,0,0,0.25);
        color: var(--text);
        cursor: pointer;
      }
      .btn.primary {
        border-color: rgba(122,162,255,0.55);
        background: rgba(122,162,255,0.18);
      }
      .btn.danger {
        border-color: rgba(255,107,107,0.55);
        background: rgba(255,107,107,0.14);
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.14);
        background: rgba(0,0,0,0.20);
        color: var(--text);
        outline: none;
      }
      .muted {
        color: var(--muted);
        font-size: 12px;
      }
      .log {
        white-space: pre-wrap;
        font-size: 14px;
        line-height: 1.35;
      }
      .split {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      @media (max-width: 820px) {
        .split { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div id="root"></div>
      <div class="muted" style="margin-top:12px;">
        Backend: <code>ws://localhost:8000/ws</code> · Mock mode by default.
      </div>
    </div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const PERSONAS = [
        { id: "friend", label: "ရဲဘော်", desc: "Friend" },
        { id: "family", label: "မိသားစု", desc: "Family" },
        { id: "teacher", label: "ဆရာ", desc: "Teacher" },
      ];

      function useWebSocket(url, { onJson, onBytes }) {
        const wsRef = React.useRef(null);
        const [readyState, setReadyState] = React.useState("CLOSED");

        React.useEffect(() => {
          const ws = new WebSocket(url);
          ws.binaryType = "arraybuffer";
          wsRef.current = ws;

          ws.onopen = () => setReadyState("OPEN");
          ws.onclose = () => setReadyState("CLOSED");
          ws.onerror = () => setReadyState("ERROR");
          ws.onmessage = (ev) => {
            if (typeof ev.data === "string") {
              try { onJson?.(JSON.parse(ev.data)); } catch {}
            } else {
              onBytes?.(ev.data);
            }
          };

          return () => ws.close();
        }, [url]);

        const sendJson = React.useCallback((obj) => {
          const ws = wsRef.current;
          if (!ws || ws.readyState !== 1) return false;
          ws.send(JSON.stringify(obj));
          return true;
        }, []);

        const sendBytes = React.useCallback((arrayBuffer) => {
          const ws = wsRef.current;
          if (!ws || ws.readyState !== 1) return false;
          ws.send(arrayBuffer);
          return true;
        }, []);

        return { readyState, sendJson, sendBytes };
      }

      function App() {
        const [personaId, setPersonaId] = React.useState("friend");
        const [input, setInput] = React.useState("");
        const [transcript, setTranscript] = React.useState("");
        const [assistantText, setAssistantText] = React.useState("");
        const [metrics, setMetrics] = React.useState(null);
        const [status, setStatus] = React.useState("");
        const [lastError, setLastError] = React.useState("");
        const [recording, setRecording] = React.useState(false);
        const [sendWav, setSendWav] = React.useState(true);
        const [streamMode, setStreamMode] = React.useState("record"); // record | stream_client | stream_server
        const mediaRecorderRef = React.useRef(null);
        const audioCtxRef = React.useRef(null);
        const processorRef = React.useRef(null);
        const streamRef = React.useRef(null);
        const vadRef = React.useRef({
          inSpeech: false,
          startHits: 0,
          endHits: 0,
          startRms: 0.012,
          endRms: 0.009,
          startFrames: 3,
          endFrames: 12,
        });

        const { readyState, sendJson, sendBytes } = useWebSocket("ws://localhost:8000/ws", {
          onJson: (msg) => {
            if (msg.type === "transcript") setTranscript(msg.text || "");
            if (msg.type === "assistant_delta") setAssistantText((prev) => (prev || "") + (msg.text || ""));
            if (msg.type === "assistant_text") setAssistantText(msg.text || "");
            if (msg.type === "metrics") setMetrics(msg.data || null);
            if (msg.type === "persona") setPersonaId(msg.persona_id || "friend");
            if (msg.type === "status") setStatus(msg.value || "");
            if (msg.type === "error") setLastError(msg.message || "error");
          },
          onBytes: async (data) => {
            const blob = new Blob([data], { type: "audio/wav" });
            const url = URL.createObjectURL(blob);
            const audio = new Audio(url);
            audio.onended = () => URL.revokeObjectURL(url);
            try { await audio.play(); } catch {}
          },
        });

        const switchPersona = (id) => {
          sendJson({ type: "switch_persona", persona_id: id });
          setTranscript("");
          setAssistantText("");
          setMetrics(null);
        };

        const sendText = () => {
          const text = input.trim();
          if (!text) return;
          setAssistantText("");
          setMetrics(null);
          setStatus("");
          setLastError("");
          sendJson({ type: "text", text });
          setInput("");
        };

        async function webmToWav16kMono(webmArrayBuffer) {
          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const decoded = await audioCtx.decodeAudioData(webmArrayBuffer.slice(0));
          const src = decoded;
          const targetRate = 16000;
          const targetLength = Math.ceil(src.duration * targetRate);
          const offline = new OfflineAudioContext(1, targetLength, targetRate);
          const source = offline.createBufferSource();
          source.buffer = src;
          source.connect(offline.destination);
          source.start();
          const rendered = await offline.startRendering();
          const channel = rendered.getChannelData(0);
          return encodeWavPCM16(channel, targetRate);
        }

        function encodeWavPCM16(float32Samples, sampleRate) {
          const numSamples = float32Samples.length;
          const bytesPerSample = 2;
          const blockAlign = 1 * bytesPerSample;
          const byteRate = sampleRate * blockAlign;
          const dataSize = numSamples * bytesPerSample;

          const buffer = new ArrayBuffer(44 + dataSize);
          const view = new DataView(buffer);
          let offset = 0;

          function writeStr(s) {
            for (let i = 0; i < s.length; i++) view.setUint8(offset + i, s.charCodeAt(i));
            offset += s.length;
          }

          writeStr("RIFF");
          view.setUint32(offset, 36 + dataSize, true); offset += 4;
          writeStr("WAVE");
          writeStr("fmt ");
          view.setUint32(offset, 16, true); offset += 4;      // fmt chunk size
          view.setUint16(offset, 1, true); offset += 2;       // PCM
          view.setUint16(offset, 1, true); offset += 2;       // mono
          view.setUint32(offset, sampleRate, true); offset += 4;
          view.setUint32(offset, byteRate, true); offset += 4;
          view.setUint16(offset, blockAlign, true); offset += 2;
          view.setUint16(offset, 16, true); offset += 2;      // bits per sample
          writeStr("data");
          view.setUint32(offset, dataSize, true); offset += 4;

          let o = 44;
          for (let i = 0; i < numSamples; i++) {
            let s = float32Samples[i];
            s = Math.max(-1, Math.min(1, s));
            const int16 = s < 0 ? s * 0x8000 : s * 0x7fff;
            view.setInt16(o, int16, true);
            o += 2;
          }
          return buffer;
        }

        function floatToInt16PCM(float32, out) {
          for (let i = 0; i < float32.length; i++) {
            let s = Math.max(-1, Math.min(1, float32[i]));
            out[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
          }
          return out;
        }

        function downsampleTo16k(input, inputRate) {
          if (inputRate === 16000) return input;
          const ratio = inputRate / 16000;
          const newLen = Math.round(input.length / ratio);
          const out = new Float32Array(newLen);
          let pos = 0;
          for (let i = 0; i < newLen; i++) {
            const idx = i * ratio;
            const i0 = Math.floor(idx);
            const i1 = Math.min(input.length - 1, i0 + 1);
            const frac = idx - i0;
            out[i] = input[i0] * (1 - frac) + input[i1] * frac;
            pos = idx;
          }
          return out;
        }

        function rmsFloat32(x) {
          let s = 0;
          for (let i = 0; i < x.length; i++) s += x[i] * x[i];
          return Math.sqrt(s / Math.max(1, x.length));
        }

        function vadPush(rms) {
          const v = vadRef.current;
          let speechStart = false;
          let speechEnd = false;
          if (!v.inSpeech) {
            if (rms >= v.startRms) v.startHits += 1;
            else v.startHits = 0;
            if (v.startHits >= v.startFrames) {
              v.inSpeech = true;
              v.endHits = 0;
              speechStart = true;
            }
          } else {
            if (rms <= v.endRms) v.endHits += 1;
            else v.endHits = 0;
            if (v.endHits >= v.endFrames) {
              v.inSpeech = false;
              v.startHits = 0;
              speechEnd = true;
            }
          }
          return { speechStart, speechEnd, inSpeech: v.inSpeech };
        }

        async function startStreaming(vadMode) {
          setLastError("");
          setAssistantText("");
          setMetrics(null);
          setStatus("");
          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            setLastError("Mic not available: getUserMedia missing");
            return;
          }
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          streamRef.current = stream;

          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          audioCtxRef.current = audioCtx;
          const src = audioCtx.createMediaStreamSource(stream);

          // ScriptProcessor is deprecated but works without bundlers/worklets.
          const processor = audioCtx.createScriptProcessor(4096, 1, 1);
          processorRef.current = processor;

          sendJson({
            type: "audio_stream_start",
            format: "pcm_s16le",
            sample_rate: 16000,
            channels: 1,
            vad_mode: vadMode,
          });

          vadRef.current.inSpeech = false;
          vadRef.current.startHits = 0;
          vadRef.current.endHits = 0;

          processor.onaudioprocess = (e) => {
            const input = e.inputBuffer.getChannelData(0);
            const down = downsampleTo16k(input, audioCtx.sampleRate);
            const r = rmsFloat32(down);

            if (vadMode === "client") {
              const { speechStart, speechEnd } = vadPush(r);
              if (speechStart) setStatus("vad_client_speech_start");
              if (speechEnd) {
                setStatus("vad_client_speech_end");
                stopStreaming(true);
                return;
              }
            }

            const pcm16 = new Int16Array(down.length);
            floatToInt16PCM(down, pcm16);
            sendBytes(pcm16.buffer);
          };

          src.connect(processor);
          processor.connect(audioCtx.destination);
          setRecording(true);
        }

        function stopStreaming(sendEnd) {
          try { processorRef.current && (processorRef.current.onaudioprocess = null); } catch {}
          try { processorRef.current && processorRef.current.disconnect(); } catch {}
          try { audioCtxRef.current && audioCtxRef.current.close(); } catch {}
          try { streamRef.current && streamRef.current.getTracks().forEach((t) => t.stop()); } catch {}
          processorRef.current = null;
          audioCtxRef.current = null;
          streamRef.current = null;
          if (sendEnd) sendJson({ type: "audio_stream_end" });
          setRecording(false);
        }

        const toggleRecord = async () => {
          if (recording) {
            if (streamMode === "record") mediaRecorderRef.current?.stop();
            else stopStreaming(true);
            return;
          }
          if (streamMode === "stream_client") {
            await startStreaming("client");
            return;
          }
          if (streamMode === "stream_server") {
            await startStreaming("server");
            return;
          }
          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            setLastError(
              "Mic not available: navigator.mediaDevices.getUserMedia is missing. Open the page via http://localhost:3000 (or http://127.0.0.1:3000) in a modern browser."
            );
            return;
          }
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
            ? "audio/webm;codecs=opus"
            : "audio/webm";
          const rec = new MediaRecorder(stream, { mimeType });
          mediaRecorderRef.current = rec;
          const chunks = [];
          rec.ondataavailable = (e) => { if (e.data && e.data.size > 0) chunks.push(e.data); };
          rec.onstop = async () => {
            setRecording(false);
            stream.getTracks().forEach((t) => t.stop());
            const blob = new Blob(chunks, { type: mimeType });
            const buf = await blob.arrayBuffer();
            if (sendWav) {
              try {
                const wavBuf = await webmToWav16kMono(buf);
                sendJson({ type: "audio_meta", mime: "audio/wav;codec=pcm_s16le;rate=16000;channels=1" });
                sendBytes(wavBuf);
                return;
              } catch (e) {
                // Fall back to raw webm bytes; backend may decode via ffmpeg.
              }
            }
            sendJson({ type: "audio_meta", mime: mimeType });
            sendBytes(buf);
          };
          rec.start();
          setRecording(true);
        };

        return (
          <div className="row" style={{ alignItems: "stretch" }}>
            <div className="card" style={{ flex: "1 1 360px" }}>
              <h1>Burmese Companion (Prototype)</h1>
              <div className="muted">WebSocket: {readyState}</div>
              <div className="muted" style={{ marginTop: 6 }}>Status: {status || "—"}</div>
              {lastError ? (
                <div className="muted" style={{ marginTop: 6, color: "var(--danger)" }}>
                  Error: {lastError}
                </div>
              ) : null}
              <div className="row" style={{ marginTop: 12 }}>
                {PERSONAS.map((p) => (
                  <button
                    key={p.id}
                    className="pill"
                    aria-pressed={personaId === p.id}
                    onClick={() => switchPersona(p.id)}
                    title={p.desc}
                  >
                    {p.label}
                  </button>
                ))}
              </div>

              <div className="row" style={{ marginTop: 12 }}>
                <button className={"btn " + (recording ? "danger" : "primary")} onClick={toggleRecord}>
                  {recording ? "Stop mic" : "Talk (mic)"}
                </button>
                <div className="muted" style={{ alignSelf: "center" }}>
                  Mic sends WAV (16k mono) if possible; else raw webm/opus.
                </div>
              </div>
              <div className="row" style={{ marginTop: 10 }}>
                <label className="muted" style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  <input type="checkbox" checked={sendWav} onChange={(e) => setSendWav(e.target.checked)} />
                  Convert mic to WAV (recommended)
                </label>
              </div>
              <div className="row" style={{ marginTop: 10 }}>
                <label className="muted" style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  Mode:
                  <select
                    value={streamMode}
                    onChange={(e) => setStreamMode(e.target.value)}
                    style={{
                      background: "rgba(0,0,0,0.20)",
                      color: "var(--text)",
                      border: "1px solid rgba(255,255,255,0.14)",
                      borderRadius: 10,
                      padding: "6px 8px",
                    }}
                    disabled={recording}
                  >
                    <option value="record">Record → send</option>
                    <option value="stream_client">Stream + client VAD</option>
                    <option value="stream_server">Stream + server VAD</option>
                  </select>
                </label>
              </div>

              <div style={{ marginTop: 12 }}>
                <input
                  value={input}
                  onChange={(e) => setInput(e.target.value)}
                  placeholder="Type Burmese (or anything) and press Enter…"
                  onKeyDown={(e) => { if (e.key === "Enter") sendText(); }}
                />
                <div className="row" style={{ marginTop: 10 }}>
                  <button className="btn primary" onClick={sendText}>Send text</button>
                </div>
              </div>
            </div>

            <div className="split" style={{ flex: "2 1 520px" }}>
              <div className="card">
                <h1>Transcript</h1>
                <div className="log">{transcript || "—"}</div>
              </div>
              <div className="card">
                <h1>Assistant</h1>
                <div className="log">{assistantText || "—"}</div>
                <div className="muted" style={{ marginTop: 10 }}>
                  {metrics
                    ? `total_ms=${Math.round(metrics.total_ms ?? 0)}`
                      + ` llm_first_token_ms=${metrics.llm_first_token_ms == null ? "-" : Math.round(metrics.llm_first_token_ms)}`
                      + ` llm_tokens=${metrics.llm_tokens == null ? "-" : metrics.llm_tokens}`
                      + ` tts_calls=${metrics.tts_calls == null ? "-" : metrics.tts_calls}`
                      + ` tts_total_ms=${metrics.tts_total_ms == null ? "-" : Math.round(metrics.tts_total_ms)}`
                      + ` stt_ms=${metrics.stt_ms == null ? "-" : Math.round(metrics.stt_ms)}`
                    : ""}
                </div>
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
